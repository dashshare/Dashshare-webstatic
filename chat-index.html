<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashShare Gold</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .auth-container, .settings-container, .profile-view-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 340px; text-align: center; margin-bottom: 20px; display: none; }
        .brand-title { color: #b58900; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .brand-sub { color: #666; font-size: 13px; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        .auth-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 8px; }
        .btn-yellow { background-color: #e6a23c; color: white; }
        .btn-green { background-color: #13ce66; color: white; }
        .btn-navy { background-color: #409eff; color: white; }
        .btn-dark { background-color: #34495e; color: white; }
        .toggle-link { margin-top: 15px; display: block; color: #e6a23c; font-size: 13px; text-decoration: none; }
        .qr-zone { display: none; margin-top: 15px; padding: 10px; border: 1px dashed #ccc; }
        #qr-canvas { width: 150px; height: 150px; margin: 0 auto; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #b58900; margin-bottom: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>

<div class="auth-container" id="auth-box">
    <div class="brand-title">DashShare Gold</div>
    <div class="brand-sub">Ultimate sharing & communication system</div>

    <div class="input-group" id="group-username" style="display: none;">
        <input type="text" class="auth-input" id="auth-name" placeholder="Display Name">
    </div>
    
    <div class="input-group">
        <input type="email" class="auth-input" id="auth-email" placeholder="Email Address">
    </div>
    
    <div class="input-group" style="display: flex; gap: 5px;">
        <input type="text" class="auth-input" id="auth-otp" placeholder="6-digit OTP Code">
        <button class="btn btn-navy" style="width: auto; margin-top: 0; white-space: nowrap;" onclick="sendOTP()">Send OTP</button>
    </div>
    
    <div class="input-group">
        <input type="password" class="auth-input" id="auth-password" placeholder="Password">
    </div>

    <button class="btn btn-yellow" id="btn-main-action" onclick="handleAuthSubmit()">SIGN IN SYSTEM</button>
    <button class="btn btn-green" onclick="loginWithPasskey()">SIGN IN WITH PASSKEY</button>
    <button class="btn btn-dark" onclick="generateQRLogin()">SCAN QR TO SIGN IN</button>

    <div class="qr-zone" id="qr-area">
        <canvas id="qr-canvas"></canvas>
        <p style="font-size: 12px; color: #666; margin: 5px 0 0 0;">Scan this QR with your logged-in mobile device</p>
    </div>

    <a href="#" class="toggle-link" id="link-toggle-auth" onclick="toggleAuthMode(event)">Don't have an account? Register now</a>
</div>

<div class="settings-container" id="settings-box">
    <div class="brand-title" style="font-size: 20px;">Profile Settings</div>
    <p style="font-size: 13px; color: #666;">Manage your security keys and profile data</p>
    
    <button class="btn btn-green" onclick="registerHardwarePasskey()">REGISTER HARDWARE PASSKEY</button>
    <button class="btn btn-dark" style="margin-top: 15px;" onclick="handleLogout()">LOGOUT</button>
</div>

<div class="profile-view-container" id="profile-view-box">
    <img src="/storage/default-avatar.png" class="avatar-img" id="view-avatar">
    <div class="brand-title" style="font-size: 22px;" id="view-name">User Profile</div>
    <p style="font-size: 14px; color: #666;" id="view-id"></p>
    <button class="btn btn-dark" onclick="window.location.href='/'">GO TO HOME</button>
</div>

<script>
let isLoginMode = true;
let token = localStorage.getItem('token');
let qrInterval = null;

document.addEventListener("DOMContentLoaded", () => {
    routeManager();
});

function routeManager() {
    const path = window.location.pathname;
    
    if (path.startsWith('/people/')) {
        const userId = path.split('/').pop();
        loadPublicProfile(userId);
    } else if (path.startsWith('/group/')) {
        const groupId = path.split('/').pop();
        loadGroupDetails(groupId);
    } else {
        if (token) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('settings-box').style.display = 'block';
            document.getElementById('profile-view-box').style.display = 'none';
        } else {
            document.getElementById('auth-box').style.display = 'block';
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('profile-view-box').style.display = 'none';
        }
    }
}

async function loadPublicProfile(id) {
    try {
        const res = await fetch(`/api/users/public/${id}`);
        const user = await res.json();
        
        if (!res.ok) {
            alert(user.error);
            window.location.href = '/';
            return;
        }

        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('settings-box').style.display = 'none';
        document.getElementById('profile-view-box').style.display = 'block';

        document.getElementById('view-name').innerText = user.name;
        document.getElementById('view-id').innerText = "ID: " + user.id;
        document.getElementById('view-avatar').src = user.avatar;
    } catch (err) {
        window.location.href = '/';
    }
}

function toggleAuthMode(e) {
    e.preventDefault();
    isLoginMode = !isLoginMode;
    clearInterval(qrInterval);
    document.getElementById('qr-area').style.display = 'none';
    
    const nameField = document.getElementById('group-username');
    const mainBtn = document.getElementById('btn-main-action');
    const toggleLink = document.getElementById('link-toggle-auth');

    if (isLoginMode) {
        nameField.style.display = 'none';
        mainBtn.innerText = 'SIGN IN SYSTEM';
        toggleLink.innerText = "Don't have an account? Register now";
    } else {
        nameField.style.display = 'block';
        mainBtn.innerText = 'REGISTER MEMBERSHIP';
        toggleLink.innerText = 'Already have an account? Back to Login';
    }
}

async function sendOTP() {
    const email = document.getElementById('auth-email').value;
    if (!email) return alert("Please enter your email address first.");
    
    try {
        const res = await fetch('/api/auth/send-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) alert("OTP code has been sent to your email.");
        else alert("Error: " + data.error);
    } catch (err) {
        alert("Failed to connect to the server.");
    }
}

async function handleAuthSubmit() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const otp = document.getElementById('auth-otp').value;
    const name = document.getElementById('auth-name').value;

    const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
    const payload = isLoginMode ? { email, password, otp } : { email, password, name, otp };

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (response.ok) {
            alert(isLoginMode ? "Sign in successfully!" : "Registration successfully!");
            token = data.token;
            localStorage.setItem('token', data.token);
            routeManager();
        } else {
            alert("Error: " + (data.error || "Authentication failed."));
        }
    } catch (err) {
        alert("System connection error. Please try again.");
    }
}

async function generateQRLogin() {
    try {
        const response = await fetch('/api/auth/qr-generate');
        const data = await response.json();
        if (!response.ok) return alert("Failed to build QR session.");

        document.getElementById('qr-area').style.display = 'block';
        QRCode.toCanvas(document.getElementById('qr-canvas'), data.qrToken, { width: 150 });

        clearInterval(qrInterval);
        qrInterval = setInterval(async () => {
            const checkRes = await fetch(`/api/auth/qr-check/${data.qrToken}`);
            const checkData = await checkRes.json();
            
            if (checkData.status === 'success') {
                clearInterval(qrInterval);
                document.getElementById('qr-area').style.display = 'none';
                alert("Sign in via QR successfully!");
                token = checkData.token;
                localStorage.setItem('token', token);
                routeManager();
            } else if (checkData.status === 'expired') {
                clearInterval(qrInterval);
                document.getElementById('qr-area').style.display = 'none';
                alert("QR session expired. Please generate again.");
            }
        }, 3000);
    } catch (err) {
        alert("Failed to initialize login QR Code.");
    }
}

async function registerHardwarePasskey() {
    try {
        const resOpts = await fetch('/api/passkey/register-options', { 
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token } 
        }); 
        const opts = await resOpts.json();
        if (opts.error) return alert("Error: " + opts.error);

        opts.challenge = Uint8Array.from(atob(opts.challenge.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
        opts.user.id = new TextEncoder().encode(opts.user.id);

        const cred = await navigator.credentials.create({ publicKey: opts });
        if (cred) {
            const resVerify = await fetch('/api/passkey/register-verify', { 
                method: 'POST', 
                headers: {
                    'Content-Type': 'application/json', 
                    'Authorization': 'Bearer ' + token
                }, 
                body: JSON.stringify({ 
                    id: cred.id,
                    rawId: btoa(String.fromCharCode.apply(null, new Uint8Array(cred.rawId)))
                }) 
            });
            const d = await resVerify.json(); 
            if (d.success) alert("Hardware security key registered successfully!");
            else alert("Storage Error: " + d.error);
        }
    } catch (err) { 
        alert("Passkey initialization failed. HTTPS connection or Localhost is strictly required."); 
    }
}

async function loginWithPasskey() {
    const email = document.getElementById('auth-email').value;
    if (!email) return alert("Please enter your email to find your bound passkey.");

    try {
        const resOpts = await fetch('/api/passkey/login-options', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const opts = await resOpts.json();
        if (opts.error) return alert("Error: " + opts.error);

        opts.challenge = Uint8Array.from(atob(opts.challenge.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
        if (opts.allowCredentials) {
            opts.allowCredentials.forEach(item => {
                item.id = Uint8Array.from(atob(item.id.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
            });
        }

        const assertion = await navigator.credentials.get({ publicKey: opts });
        if (assertion) {
            const resVerify = await fetch('/api/passkey/login-verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email,
                    id: assertion.id
                })
            });
            const d = await resVerify.json();
            if (d.success) {
                alert("Sign in via Passkey successfully!");
                token = d.token;
                localStorage.setItem('token', token);
                routeManager();
            } else {
                alert("Verification Error: " + d.error);
            }
        }
    } catch (err) {
        alert("Passkey login negotiation failed.");
    }
}

async function loadGroupDetails(groupId) {
    if (!token) {
        alert("Please login first to join this group.");
        window.location.href = '/';
        return;
    }
    try {
        const response = await fetch(`/api/groups/${groupId}`, {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await response.json();
        if (!response.ok) {
            alert("Session expired. Please sign in again.");
            handleLogout();
        } else {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('profile-view-box').style.display = 'block';
            document.getElementById('view-name').innerText = "Group: " + data.groupId;
            document.getElementById('view-id').innerText = "Access Status: " + data.status;
        }
    } catch (err) {
        handleLogout();
    }
}

function handleLogout() {
    token = null;
    localStorage.removeItem('token');
    clearInterval(qrInterval);
    window.location.href = '/';
}
</script>
</body>
</html>
