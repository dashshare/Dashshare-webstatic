<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashShare Gold</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --gold-light: #fef08a; --gold-primary: #eab308; --gold-dark: #a16207;
            --border-color: #e2e8f0; --text-main: #0f172a; --text-sub: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: #f1f5f9; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        .auth-container { position: fixed; inset: 0; background: #f1f5f9; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .auth-card { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; }
        .auth-submit { width: 100%; padding: 12px; background: var(--gold-primary); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 8px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .auth-submit:hover { background: var(--gold-dark); }
        
        .app-layout { display: none; width: 100%; height: 100%; }
        .nav-sidebar { width: 68px; background: #1e1b4b; display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-avatar { width: 44px; height: 44px; border-radius: 50%; background-size: cover; background-position: center; cursor: pointer; border: 2px solid var(--gold-light); }
        .nav-item { font-size: 22px; color: rgba(255,255,255,0.5); cursor: pointer; text-align: center; width: 100%; padding: 10px 0; }
        .nav-item.active { color: var(--gold-primary); }
        
        .list-panel { width: 320px; background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 14px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .chat-item.active { background: var(--gold-light); }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }
        .chat-header { padding: 16px; background: #fff; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; } .msg-row.me { justify-content: flex-end; }
        .msg-bubble { max-width: 60%; padding: 10px 14px; border-radius: 12px; background: #fff; border: 1px solid var(--border-color); font-size: 14px; }
        .msg-row.me .msg-bubble { background: var(--gold-light); }
        .input-bar { padding: 16px; background: #fff; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(4px); }
        .modal-card { background: #fff; padding: 25px; border-radius: 16px; width: 90%; max-width: 440px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
        .danger-zone { margin-top: 20px; padding-top: 15px; border-top: 2px dashed #ef4444; text-align: left; }
        .danger-box { background: #fff5f5; border: 1px solid #fed7d7; padding: 12px; border-radius: 8px; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <h2 style="color: var(--gold-dark); margin-bottom: 5px;">DashShare Gold</h2>
            <p style="font-size: 12px; color: var(--text-sub); margin-bottom: 20px;">Hệ thống chia sẻ & liên lạc tối ưu</p>
            
            <input type="text" id="auth-name" class="auth-input" placeholder="Tên hiển thị thành viên" style="display: none;">
            <input type="email" id="auth-email" class="auth-input" placeholder="Địa chỉ Email tài khoản">
            
            <div id="register-otp-box" style="display: flex; gap: 8px; margin: 4px 0; align-items: center;">
                <input type="text" id="auth-otp" class="auth-input" placeholder="Mã OTP 6 số" style="margin:0;">
                <button type="button" onclick="sendAuthOtp()" style="padding:12px 15px; background:#3b82f6; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;">Gửi OTP</button>
            </div>

            <input type="password" id="auth-password" class="auth-input" placeholder="Mật khẩu bảo mật">
            
            <button id="btn-submit-auth" class="auth-submit" onclick="submitAuth()"><i class="fa-solid fa-right-to-bracket"></i> ĐĂNG NHẬP</button>
            <button class="auth-submit" style="background:#10b981;" onclick="loginWithPasskey()"><i class="fa-solid fa-fingerprint"></i> ĐĂNG NHẬP BẰNG PASSKEY</button>
            <button class="auth-submit" style="background:#475569;" onclick="openQrLoginModal()"><i class="fa-solid fa-qrcode"></i> ĐĂNG NHẬP NHANH BẰNG MÃ QR</button>
            
            <p onclick="toggleAuthMode()" id="switch-text" style="font-size:13px; margin-top:15px; color:var(--gold-dark); cursor:pointer; font-weight: 500;">Chưa có tài khoản? Đăng ký ngay</p>
        </div>
    </div>

    <div id="app-screen" class="app-layout">
        <div class="nav-sidebar">
            <div class="nav-avatar" id="user-avatar-btn" onclick="openProfileModal()"></div>
            <div class="nav-item active"><i class="fa-regular fa-comment-dots"></i></div>
            <div class="nav-item" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
        </div>
        <div class="list-panel">
            <div style="padding:16px; border-bottom:1px solid var(--border-color);">
                <input type="text" placeholder="Tìm kiếm bạn bè..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1; outline:none;">
            </div>
            <div class="chat-list" id="sidebar-items"></div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <h3 id="chat-title">Hệ thống DashShare</h3>
                    <p style="font-size:12px; color:var(--text-sub);">Hãy chọn cuộc trò chuyện</p>
                </div>
                <button onclick="startQrScanner()" style="padding:8px 12px; background:#fff; border:1px solid #cbd5e1; border-radius:8px; font-weight:600; cursor:pointer; font-size:12px;"><i class="fa-solid fa-camera"></i> QUÉT QR ĐĂNG NHẬP MÁY KHÁC</button>
            </div>
            
            <div id="scanner-zone" style="display:none; text-align:center; padding:10px; background:#fff; border-bottom:1px solid var(--border-color);">
                <div id="reader" style="width:250px; margin:0 auto;"></div>
                <button onclick="stopQrScanner()" style="margin-top:8px; background:#ef4444; color:#fff; border:none; padding:6px 12px; border-radius:6px; font-weight:600; cursor:pointer;">Đóng Camera</button>
            </div>

            <div class="msg-area" id="msg-box"></div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Nhập tin nhắn...">
                <button class="auth-submit" style="width:auto; margin:0; padding:0 20px;" onclick="sendMessage()">GỬI</button>
            </div>
        </div>
    </div>

    <div class="modal" id="qr-login-modal">
        <div class="modal-card" style="text-align:center;">
            <h3 style="margin-bottom: 5px;">Mã QR Đăng nhập nhanh</h3>
            <p style="font-size:12px; color:var(--text-sub); margin-bottom:20px;">Sử dụng tính năng Quét trên máy đã đăng nhập để quét mã này</p>
            <div id="login-qr-container" style="display:inline-block; padding:12px; background:#fff; border:1px solid #cbd5e1; border-radius:8px; margin-bottom:15px;"></div>
            <button class="auth-submit" style="background:#94a3b8;" onclick="closeModal('qr-login-modal')">Đóng cửa sổ</button>
        </div>
    </div>

    <div class="modal" id="profile-modal">
        <div class="modal-card">
            <h3 style="text-align:center; margin-bottom:15px;">Cấu hình hệ thống & Bảo mật</h3>
            <label style="font-size:12px; font-weight:600; display:block; text-align:left;">Mã khóa bảo vệ màn hình (4 số PIN):</label>
            <input type="text" id="p-pin" class="auth-input" placeholder="Nhập 4 số PIN">
            
            <label style="font-size:12px; font-weight:600; display:block; text-align:left; margin-top:10px;">Tên hiển thị:</label>
            <input type="text" id="p-name" class="auth-input">
            
            <button class="auth-submit" style="background:#10b981; margin-top:10px;" onclick="registerPasskey()"><i class="fa-solid fa-key"></i> ĐĂNG KÝ KHÓA BẢO MẬT (PASSKEY)</button>
            <button class="auth-submit" onclick="saveProfile()">LƯU THÔNG TIN HỒ SƠ</button>

            <div class="danger-zone">
                <h4 style="color:#ef4444; font-weight:700;"><i class="fa-solid fa-triangle-exclamation"></i> Danger Zone</h4>
                <div class="danger-box">
                    <p style="font-size:12px; font-weight:600;">Thay đổi địa chỉ Email tài khoản:</p>
                    <input type="email" id="danger-email" class="auth-input" placeholder="Nhập Email mới...">
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="text" id="danger-otp" class="auth-input" placeholder="Mã OTP" style="margin:0; width:110px;">
                        <button onclick="sendDangerEmailOtp()" style="padding:10px; background:#3b82f6; color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;">Nhận OTP</button>
                        <button onclick="executeChangeEmail()" style="padding:10px; background:#eab308; color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;">Thay đổi</button>
                    </div>
                </div>
                <button onclick="executeDeleteAccount()" class="auth-submit" style="background:#ef4444; font-weight:bold; width:100%; margin-top:10px;"><i class="fa-solid fa-user-xmark"></i> XÓA TÀI KHOẢN VĨNH VIỄN</button>
            </div>
            <button class="auth-submit" style="background:#94a3b8; margin-top:15px;" onclick="closeModal('profile-modal')">Đóng tab</button>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('gold_token') || '';
        let currentUser = null;
        let isRegisterMode = false;
        let activeChatId = '';
        let qrInterval = null;
        let html5QrCode = null;

        if (token) initApp();

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-name').style.display = isRegisterMode ? 'block' : 'none';
            // Vùng nhập OTP luôn luôn hiển thị cho cả hai luồng xử lý
            document.getElementById('register-otp-box').style.display = 'flex'; 
            document.getElementById('btn-submit-auth').innerHTML = isRegisterMode ? '<i class="fa-solid fa-user-plus"></i> ĐĂNG KÝ HỘI VIÊN' : '<i class="fa-solid fa-right-to-bracket"></i> ĐĂNG NHẬP';
            document.getElementById('switch-text').innerText = isRegisterMode ? 'Đã có tài khoản? Quay lại đăng nhập' : 'Chưa có tài khoản? Đăng ký ngay';
        }

        // --- GỬI OTP CHO AUTHENTICATION ---
        async function sendAuthOtp() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Vui lòng nhập địa chỉ Email trước khi yêu cầu nhận OTP.");
            const r = await fetch('/api/auth/send-otp', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email }) });
            const d = await r.json();
            alert(d.message || d.error);
        }

        // --- XỬ LÝ ĐĂNG NHẬP / ĐĂNG KÝ ĐỒNG BỘ MÃ OTP ---
        async function submitAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const name = isRegisterMode ? document.getElementById('auth-name').value : "LoginMode";
            const otp = document.getElementById('auth-otp').value; 
            
            if(!email || !password || !otp) return alert("Vui lòng điền đầy đủ Email, Mật khẩu và Mã OTP!");

            const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
            const payload = { email, password, name, otp };

            const r = await fetch(endpoint, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
            const d = await r.json();
            if (d.token) {
                localStorage.setItem('gold_token', d.token); token = d.token; window.location.reload();
            } else alert(d.error);
        }

        // --- GOOGLE PASSKEY ---
        async function registerPasskey() {
            try {
                const rOptions = await fetch('/api/passkey/register-options', { headers: {'Authorization': 'Bearer ' + token} });
                const options = await rOptions.json();
                options.challenge = Uint8Array.from(atob(options.challenge.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
                options.user.id = new TextEncoder().encode(options.user.id);

                const credential = await navigator.credentials.create({ publicKey: options });
                await fetch('/api/passkey/register-verify', {
                    method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token},
                    body: JSON.stringify({ id: credential.id })
                });
                alert("Liên kết mã Passkey bảo mật phần cứng thành công!");
            } catch(e) { alert("Thao tác thiết bị thất bại."); }
        }

        async function loginWithPasskey() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Điền Email trước khi đăng nhập bằng thiết bị bảo mật.");
            try {
                const rOptions = await fetch('/api/passkey/login-options', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
                const options = await rOptions.json();
                if(options.error) return alert(options.error);

                options.challenge = Uint8Array.from(atob(options.challenge.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
                options.allowCredentials = options.allowCredentials.map(c => ({ ...c, id: Uint8Array.from(atob(c.id), x => x.charCodeAt(0)), type: 'public-key' }));

                const assertion = await navigator.credentials.get({ publicKey: options });
                const v = await fetch('/api/passkey/login-verify', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, id: assertion.id}) });
                const d = await v.json();
                if(d.token) { localStorage.setItem('gold_token', d.token); token = d.token; window.location.reload(); } else alert(d.error);
            } catch(e) { alert("Không tìm thấy dữ liệu khóa Passkey tương thích trên thiết bị."); }
        }

        // --- ĐĂNG NHẬP NHANH BẰNG QR ---
        async function openQrLoginModal() {
            document.getElementById('login-qr-container').innerHTML = '';
            const r = await fetch('/api/auth/qr-generate');
            const d = await r.json();
            
            new QRCode(document.getElementById('login-qr-container'), { text: d.qr_data, width: 180, height: 180 });
            openModal('qr-login-modal');

            clearInterval(qrInterval);
            qrInterval = setInterval(async () => {
                const res = await fetch(`/api/auth/qr-check/${d.session_id}`);
                const statusData = await res.json();
                if (statusData.status === 'success') {
                    clearInterval(qrInterval);
                    localStorage.setItem('gold_token', statusData.token);
                    window.location.reload();
                } else if (statusData.status === 'expired') {
                    clearInterval(qrInterval); alert("Mã QR đã hết hạn hiệu lực."); closeModal('qr-login-modal');
                }
            }, 2000);
        }

        function startQrScanner() {
            document.getElementById('scanner-zone').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, async (text) => {
                if (text.startsWith('dashshare-login:')) {
                    const session_id = text.split(':')[1];
                    stopQrScanner();
                    const r = await fetch('/api/auth/qr-authorize', {
                        method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token},
                        body: JSON.stringify({ session_id })
                    });
                    const d = await r.json(); alert(d.message || d.error);
                }
            }, () => {});
        }
        function stopQrScanner() { if(html5QrCode) { html5QrCode.stop().then(() => document.getElementById('scanner-zone').style.display='none').catch(()=>{}); } }

        // --- ĐỒNG BỘ KHÔNG GIAN LÀM VIỆC ---
        async function initApp() {
            const r = await fetch('/api/profile/update', { method: 'POST', headers: {'Authorization': 'Bearer ' + token}, body: new FormData() });
            const d = await r.json();
            if (d.user) {
                currentUser = d.user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('user-avatar-btn').style.backgroundImage = `url(${currentUser.avatar || '/storage/default-avatar.png'})`;
                syncSidebar();
            }
        }

        function syncSidebar() {
            fetch('/api/sidebar/list', { headers: {'Authorization': 'Bearer ' + token} }).then(r=>r.json()).then(data => {
                const list = document.getElementById('sidebar-items'); list.innerHTML = '';
                data.friends.forEach(f => {
                    const div = document.createElement('div'); div.className = 'chat-item';
                    div.innerHTML = `<strong>👤 ${f.name}</strong>`;
                    div.onclick = () => {
                        document.querySelectorAll('.chat-item').forEach(e => e.classList.remove('active'));
                        div.classList.add('active'); activeChatId = f.id;
                        document.getElementById('chat-title').innerText = f.name;
                        document.getElementById('msg-box').innerHTML = '';
                    };
                    list.appendChild(div);
                });
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !activeChatId) return;
            const box = document.getElementById('msg-box');
            box.innerHTML += `<div class="msg-row me"><div class="msg-bubble">${input.value}</div></div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;
        }

        // --- THAO TÁC CỦA DANGER ZONE ---
        async function sendDangerEmailOtp() {
            const email = document.getElementById('danger-email').value;
            if(!email) return alert("Hãy nhập Email mới cần chuyển đổi.");
            const r = await fetch('/api/auth/send-otp', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email }) });
            const d = await r.json(); alert(d.message || d.error);
        }
        async function executeChangeEmail() {
            const newEmail = document.getElementById('danger-email').value;
            const otp = document.getElementById('danger-otp').value;
            const r = await fetch('/api/profile/danger/change-email', { method: 'POST', headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body: JSON.stringify({ newEmail, otp }) });
            const d = await r.json(); if(d.success) { alert(d.message); window.location.reload(); } else alert(d.error);
        }
        async function executeDeleteAccount() {
            if(confirm("XÁC NHẬN NGUY HIỂM: Toàn bộ lịch sử tin nhắn, khóa Passkey và thông tin tài khoản của bạn sẽ bị xóa vĩnh viễn khỏi máy chủ hệ thống. Vẫn tiếp tục?")) {
                const r = await fetch('/api/profile/danger/delete-account', { method: 'POST', headers: {'Authorization':'Bearer '+token} });
                const d = await r.json(); if(d.success) { alert(d.message); logout(); }
            }
        }

        function openProfileModal() {
            document.getElementById('p-name').value = currentUser.name;
            document.getElementById('p-pin').value = currentUser.pin || '';
            openModal('profile-modal');
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; clearInterval(qrInterval); }
        function logout() { localStorage.removeItem('gold_token'); window.location.reload(); }
    </script>
</body>
</html>
