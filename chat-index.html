<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashShare Gold</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --gold-light: #fef08a; --gold-primary: #eab308; --gold-dark: #a16207;
            --border-color: #e2e8f0; --text-main: #0f172a; --text-sub: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: #f1f5f9; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        .auth-container { position: fixed; inset: 0; background: #f1f5f9; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: #fff; padding: 32px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 360px; text-align: center; border: 1px solid var(--border-color); }
        .auth-logo { font-size: 26px; font-weight: 800; color: var(--gold-dark); margin-bottom: 6px; letter-spacing: -0.5px; }
        .auth-desc { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; }
        .auth-input { width: 100%; padding: 12px 14px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; transition: all 0.2s; }
        .auth-input:focus { border-color: var(--gold-primary); box-shadow: 0 0 0 3px rgba(234,179,8,0.15); }
        .auth-btn { width: 100%; padding: 12px; background: var(--gold-primary); color: #fff; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .auth-btn:hover { background: var(--gold-dark); }
        
        .app-layout { display: none; width: 100vw; height: 100vh; }
        .nav-sidebar { width: 68px; background: #1e1b4b; display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-avatar { width: 44px; height: 44px; border-radius: 50%; background-size: cover; background-position: center; cursor: pointer; border: 2px solid var(--gold-light); transition: transform 0.2s; }
        .nav-avatar:hover { transform: scale(1.05); }
        .nav-item { font-size: 22px; color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; width: 100%; text-align: center; padding: 10px 0; position: relative; }
        .nav-item:hover, .nav-item.active { color: var(--gold-primary); }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 4px; background: var(--gold-primary); border-radius: 0 4px 4px 0; }
        
        .list-panel { width: 320px; background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-header { padding: 20px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-size: 18px; font-weight: 700; }
        .list-items { flex: 1; overflow-y: auto; padding: 8px; }
        .item-card { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
        .item-card:hover, .item-card.active { background: #f1f5f9; }
        .item-avatar { width: 44px; height: 44px; border-radius: 50%; background-size: cover; background-position: center; background-color: #e2e8f0; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-sub { font-size: 12px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .content-view { flex: 1; display: flex; flex-direction: column; background: #f8fafc; position: relative; }
        .welcome-view { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f8fafc; z-index: 10; text-align: center; }
        
        .chat-view { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 14px 24px; background: #fff; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .chat-title { font-weight: 700; font-size: 16px; }
        .msg-area { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        
        .msg-row { display: flex; gap: 10px; max-width: 75%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; background: #fff; border: 1px solid var(--border-color); font-size: 14px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .msg-row.me .msg-bubble { background: var(--gold-light); border-color: #fde047; }
        
        .input-bar { padding: 16px 24px; background: #fff; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .input-box { flex: 1; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-size: 14px; transition: all 0.2s; }
        .input-box:focus { border-color: var(--gold-primary); }
        .action-icon { font-size: 20px; color: var(--text-sub); cursor: pointer; transition: color 0.2s; }
        .action-icon:hover { color: var(--gold-primary); }
        
        .modal { position: fixed; inset: 0; background: rgba(15,23,42,0.3); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: #fff; padding: 28px; border-radius: 16px; width: 100%; max-width: 420px; border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-main); }
        
        .profile-header { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div class="auth-container" id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">DashShare Gold</div>
            <div class="auth-desc" id="auth-desc-text">Ultimate sharing & communication platform</div>
            
            <div id="register-fields" style="display: none;">
                <input type="text" id="auth-name" class="auth-input" placeholder="Tên hiển thị của bạn">
            </div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Địa chỉ Email">
            <div style="display: flex; gap: 8px; margin-bottom: 0;">
                <input type="text" id="auth-otp" class="auth-input" placeholder="Mã xác thực OTP">
                <button type="button" onclick="sendAuthOtp()" style="padding: 0 14px; height: 45px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;">Gửi OTP</button>
            </div>
            <input type="password" id="auth-password" class="auth-input" placeholder="Mật khẩu bảo mật">
            
            <button class="auth-btn" onclick="submitAuthForm()" id="main-auth-btn">ĐĂNG NHẬP HỆ THỐNG</button>
            <button class="auth-btn" style="background: #10b981;" onclick="loginWithPasskey()"><i class="fa-solid fa-fingerprint"></i> ĐĂNG NHẬP PASSKEY</button>
            <button class="auth-btn" style="background: #475569;" onclick="openQrLoginModal()"><i class="fa-solid fa-qrcode"></i> QUÉT MÃ QR CODE</button>
            
            <div style="font-size: 13px; margin-top: 16px; color: var(--gold-dark); cursor: pointer;" onclick="toggleAuthMode()" id="toggle-auth-link">Chưa có tài khoản? Đăng ký ngay</div>
        </div>
    </div>

    <div class="app-layout" id="app-screen">
        <div class="nav-sidebar">
            <div class="nav-avatar" id="sidebar-user-avatar" onclick="openProfileModal()"></div>
            <div class="nav-item active"><i class="fa-regular fa-comment-dots"></i></div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto;"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
        </div>
        
        <div class="list-panel">
            <div class="panel-header">
                <div class="panel-title">Trò chuyện</div>
                <div>
                    <button onclick="openCreateGroupModal()" style="padding: 6px 12px; background: var(--gold-primary); color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer;"><i class="fa-solid fa-plus"></i> Tạo Nhóm</button>
                </div>
            </div>
            <div class="list-items" id="sidebar-data-list"></div>
        </div>
        
        <div class="content-view">
            <div class="welcome-view" id="chat-welcome-screen">
                <i class="fa-regular fa-comments" style="font-size: 48px; color: var(--gold-primary); margin-bottom: 12px;"></i>
                <h3 style="font-size: 18px; margin-bottom: 4px;">Hệ thống DashShare Gold v4</h3>
                <p style="font-size: 13px; color: var(--text-sub);">Vui lòng chọn một cuộc trò chuyện từ danh sách bên trái</p>
            </div>
            
            <div class="chat-view">
                <div class="chat-header">
                    <div>
                        <div class="chat-title" id="active-chat-title">Phòng Trò Chuyện</div>
                    </div>
                </div>
                
                <div class="msg-area" id="message-container-box"></div>
                
                <div class="input-bar">
                    <input type="text" class="input-box" id="chat-text-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendTextMessage()">
                    <i class="fa-regular fa-paper-plane action-icon" style="color: var(--gold-primary);" onclick="sendTextMessage()"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="profile-modal">
        <div class="modal-card">
            <div class="modal-title">Thiết lập tài khoản</div>
            <div class="profile-header" style="text-align: center;">
                <div style="font-weight:700; font-size:16px; margin-bottom: 4px;" id="profile-display-name">User Name</div>
                <div style="font-size:12px; color:var(--text-sub); margin-bottom: 16px;" id="profile-display-id">ID: ds000000</div>
            </div>
            <button class="auth-btn" style="background:#10b981;" onclick="registerHardwarePasskey()"><i class="fa-solid fa-key"></i> ĐĂNG KÝ PASSKEY PHẦN CỨNG</button>
            <button class="auth-btn" style="background:#64748b; margin-top:8px;" onclick="closeModal('profile-modal')">Đóng cửa sổ</button>
        </div>
    </div>

    <div class="modal" id="qr-login-modal">
        <div class="modal-card" style="text-align: center;">
            <div class="modal-title">Quét mã QR đăng nhập nhanh</div>
            <div id="login-qr-container" style="display: inline-block; padding: 12px; background: #fff; border: 1px solid var(--border-color); margin-bottom: 12px;"></div>
            <button class="auth-btn" style="background: #64748b; margin-top: 16px;" onclick="closeModal('qr-login-modal')">Đóng</button>
        </div>
    </div>

    <div class="modal" id="create-group-modal">
        <div class="modal-card">
            <div class="modal-title">Tạo phòng nhóm mới</div>
            <input type="text" id="new-group-name" class="auth-input" placeholder="Tên phòng nhóm">
            <input type="text" id="new-group-desc" class="auth-input" placeholder="Mô tả mục đích nhóm">
            <button class="auth-btn" onclick="submitCreateGroupRoom()">XÁC NHẬN TẠO NHÓM</button>
            <button class="auth-btn" style="background:#64748b; margin-top:8px;" onclick="closeModal('create-group-modal')">Hủy bỏ</button>
        </div>
    </div>

    <script>
        let socket = io();
        let token = localStorage.getItem('gold_token') || '';
        let currentUser = null;
        let activeChatId = null;
        let isRegisterMode = false;
        let qrCheckInterval = null;

        // Hàm helper chuyển đổi chuỗi Base64URL sang ArrayBuffer dùng cho WebAuthn API
        function base64urlToBuffer(baseurl) {
            const padding = '='.repeat((4 - baseurl.length % 4) % 4);
            const base64 = (baseurl + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const raw = window.atob(base64);
            const buffer = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) buffer[i] = raw.charCodeAt(i);
            return buffer.buffer;
        }

        // Hàm helper mã hóa ArrayBuffer sang chuỗi dạng Base64URL
        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let raw = '';
            for (const b of bytes) raw += String.fromCharCode(b);
            return window.btoa(raw).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (token) {
                initApplicationWorkspace();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        // ================== LOGIC XỬ LÝ ĐĂNG NHẬP PASSKEY ==================
        async function loginWithPasskey() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Vui lòng nhập địa chỉ Email để xác thực đăng nhập Passkey.");
            
            try {
                // 1. Lấy Options sinh trắc học/phần cứng từ Backend
                const resOptions = await fetch('/api/passkey/login-options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const options = await resOptions.json();
                if(options.error) return alert(options.error);

                // Convert challenge và allowCredentials từ chuỗi sang Buffer
                options.challenge = base64urlToBuffer(options.challenge);
                if (options.allowCredentials) {
                    options.allowCredentials.forEach(cred => {
                        cred.id = base64urlToBuffer(cred.id);
                    });
                }

                // 2. Gọi xác thực thiết bị phần cứng của trình duyệt (TouchID/FaceID/Windows Hello)
                const credential = await navigator.credentials.get({ publicKey: options });
                
                // 3. Đóng gói dữ liệu trả về và gửi lên Backend để xác thực
                const loginPayload = {
                    email,
                    id: credential.id,
                    rawId: bufferToBase64url(credential.rawId),
                    type: credential.type,
                    response: {
                        authenticatorData: bufferToBase64url(credential.response.authenticatorData),
                        clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
                        signature: bufferToBase64url(credential.response.signature),
                        userHandle: credential.response.userHandle ? bufferToBase64url(credential.response.userHandle) : null
                    }
                };

                const resVerify = await fetch('/api/passkey/login-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginPayload)
                });
                const d = await resVerify.json();

                if(d.success && d.token) {
                    localStorage.setItem('gold_token', d.token);
                    window.location.reload();
                } else {
                    alert(d.error || "Xác thực danh tính Passkey thất bại.");
                }
            } catch(err) {
                console.error(err);
                alert("Thiết bị từ chối xác thực hoặc không tìm thấy cấu hình Passkey tương thích.");
            }
        }

        // ================== LOGIC ĐĂNG KÝ THIẾT BỊ PASSKEY MỚI ==================
        async function registerHardwarePasskey() {
            try {
                // 1. Lấy cấu hình đăng ký khóa mới từ server
                const resOptions = await fetch('/api/passkey/register-options', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const options = await resOptions.json();
                if(options.error) return alert(options.error);

                // Convert dữ liệu challenge và user id sang định dạng ArrayBuffer thích hợp
                options.challenge = base64urlToBuffer(options.challenge);
                options.user.id = base64urlToBuffer(options.user.id);
                if (options.excludeCredentials) {
                    options.excludeCredentials.forEach(cred => {
                        cred.id = base64urlToBuffer(cred.id);
                    });
                }

                // 2. Kích hoạt Trình quản lý biểu mẫu Sinh trắc học của Hệ điều hành tạo khóa mới
                const credential = await navigator.credentials.create({ publicKey: options });

                // 3. Chuyển đổi dữ liệu và gửi lên API verify đăng ký khóa
                const regPayload = {
                    id: credential.id,
                    rawId: bufferToBase64url(credential.rawId),
                    type: credential.type,
                    response: {
                        attestationObject: bufferToBase64url(credential.response.attestationObject),
                        clientDataJSON: bufferToBase64url(credential.response.clientDataJSON)
                    }
                };

                const resVerify = await fetch('/api/passkey/register-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(regPayload)
                });
                const d = await resVerify.json();
                if(d.success) {
                    alert("Đăng ký thành công khóa bảo mật phần cứng Passkey!");
                    closeModal('profile-modal');
                } else {
                    alert(d.error || "Lỗi lưu cấu hình Passkey.");
                }
            } catch(err) {
                console.error(err);
                alert("Hủy bỏ thao tác đăng ký hoặc thiết bị không hỗ trợ phương thức này.");
            }
        }

        // ================== CÁC LOGIC HỆ THỐNG KHÁC GIỮ NGUYÊN KHÔNG ĐỔI ==================
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('register-fields').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('main-auth-btn').innerText = isRegisterMode ? 'ĐĂNG KÝ HỘI VIÊN' : 'ĐĂNG NHẬP HỆ THỐNG';
            document.getElementById('toggle-auth-link').innerText = isRegisterMode ? 'Đã có tài khoản? Quay lại đăng nhập' : 'Chưa có tài khoản? Đăng ký ngay';
        }

        async function sendAuthOtp() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Vui lòng điền Email trước.");
            const r = await fetch('/api/auth/send-otp', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
            const d = await r.json(); alert(d.message || d.error);
        }

        async function submitAuthForm() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const otp = document.getElementById('auth-otp').value;
            const name = isRegisterMode ? document.getElementById('auth-name').value : '';

            const url = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
            const body = isRegisterMode ? { email, password, name, otp } : { email, password, otp };

            const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            const d = await r.json();
            if(d.success && d.token) {
                localStorage.setItem('gold_token', d.token);
                window.location.reload();
            } else { alert(d.error || "Có lỗi xảy ra."); }
        }

        async function openQrLoginModal() {
            const r = await fetch('/api/auth/qr-generate');
            const d = await r.json();
            document.getElementById('login-qr-container').innerHTML = '';
            new QRCode(document.getElementById('login-qr-container'), { text: d.qr_data, width: 180, height: 180 });
            openModal('qr-login-modal');
            
            if(qrCheckInterval) clearInterval(qrCheckInterval);
            qrCheckInterval = setInterval(async () => {
                const res = await fetch(`/api/auth/qr-check/${d.session_id}`);
                const sd = await res.json();
                if(sd.status === 'success') {
                    clearInterval(qrCheckInterval);
                    localStorage.setItem('gold_token', sd.token);
                    window.location.reload();
                }
            }, 3000);
        }

        async function initApplicationWorkspace() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            
            const r = await fetch('/api/profile/update', { method:'POST', headers:{'Authorization':'Bearer '+token} });
            const d = await r.json();
            if(d.success) {
                currentUser = d.user;
                document.getElementById('sidebar-user-avatar').style.backgroundImage = `url('${currentUser.avatar || 'https://placehold.co/150x150/eab308/ffffff?text=Ava'}')`;
                loadSidebarData();
            } else { logout(); }
        }

        async function loadSidebarData() {
            const r = await fetch('/api/sidebar/list', { headers:{'Authorization':'Bearer '+token} });
            const d = await r.json();
            const container = document.getElementById('sidebar-data-list');
            container.innerHTML = '';

            d.groups.forEach(g => {
                container.innerHTML += `
                    <div class="item-card" onclick="openChatRoom('${g.id}', '${g.name}')" id="chat-item-${g.id}">
                        <div class="item-avatar" style="background-image: url('${g.avatar || 'https://placehold.co/150x150/eab308/ffffff?text=Group'}')"></div>
                        <div class="item-info">
                            <div class="item-name">${g.name}</div>
                            <div class="item-sub">Nhấp để mở phòng trò chuyện</div>
                        </div>
                    </div>`;
            });
        }

        function openChatRoom(id, name) {
            activeChatId = id;
            document.getElementById('chat-welcome-screen').style.display = 'none';
            document.getElementById('active-chat-title').innerText = name;
            socket.emit('join_room', id);
            loadChatHistory(id);
        }

        async function loadChatHistory(id) {
            const r = await fetch(`/api/chat/history/${id}`, { headers:{'Authorization':'Bearer '+token} });
            const messages = await r.json();
            const box = document.getElementById('message-container-box');
            box.innerHTML = '';
            messages.forEach(m => {
                const isMe = m.sender_id === currentUser.id;
                box.innerHTML += `
                    <div class="msg-row ${isMe ? 'me' : ''}">
                        <div class="msg-bubble">
                            <strong style="font-size:11px; display:block; color:var(--gold-dark);">${m.sender_name}</strong>
                            <div>${m.text}</div>
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        function sendTextMessage() {
            const inp = document.getElementById('chat-text-input');
            const txt = inp.value.trim();
            if(!txt || !activeChatId) return;

            socket.emit('msg_send', {
                chat_id: activeChatId,
                sender_id: currentUser.id,
                sender_name: currentUser.name,
                text: txt,
                file_url: ''
            });
            inp.value = '';
        }

        socket.on('msg_receive', (data) => {
            if(data.chat_id === activeChatId) {
                const box = document.getElementById('message-container-box');
                const isMe = data.sender_id === currentUser.id;
                box.innerHTML += `
                    <div class="msg-row ${isMe ? 'me' : ''}">
                        <div class="msg-bubble">
                            <strong style="font-size:11px; display:block; color:var(--gold-dark);">${data.sender_name}</strong>
                            <div>${data.text}</div>
                        </div>
                    </div>`;
                box.scrollTop = box.scrollHeight;
            }
        });

        async function submitCreateGroupRoom() {
            const name = document.getElementById('new-group-name').value;
            const description = document.getElementById('new-group-desc').value;
            if(!name) return alert("Vui lòng điền tên phòng nhóm.");

            const res = await fetch('/api/groups/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ name, description })
            });
            if(res.ok) { closeModal('create-group-modal'); loadSidebarData(); }
        }

        function openProfileModal() {
            if(!currentUser) return;
            document.getElementById('profile-display-name').innerText = currentUser.name;
            document.getElementById('profile-display-id').innerText = "ID: " + currentUser.id;
            openModal('profile-modal');
        }
        function openCreateGroupModal() { openModal('create-group-modal'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; if(id==='qr-login-modal'&&qrCheckInterval) clearInterval(qrCheckInterval); }
        function logout() { localStorage.removeItem('gold_token'); window.location.reload(); }
    </script>
</body>
</html>
