<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashShare Gold UI Platform</title>
    <link rel="icon" href="https://icon.gdscdn.pages.dev/icon-main.ico" type="image/x-icon">
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold-primary: #d4af37; --gold-dark: #b45309; --bg-sidebar: #1e1b4b; --bg-chat: #fefcf3; --border-color: #f3f4f6; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--bg-chat); }
        .auth-container { position: fixed; inset: 0; background: #fafaf9; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .auth-card { background: #fff; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .auth-submit { width: 100%; padding: 12px; background: var(--gold-primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .app-layout { display: none; width: 100%; height: 100%; flex-direction: row; }
        .zalo-list-panel { width: 340px; background: #fff; border-right: 1px solid #eee; overflow-y: auto; }
        .zalo-chat-main { flex: 1; display: flex; flex-direction: column; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast-item { background: #1e1b4b; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    
    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <h3>Đăng nhập DashShare</h3>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Mật khẩu">
            <button class="auth-submit" id="btn-login">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="app-screen" class="app-layout">
        <div class="zalo-list-panel">
            <div id="sidebar-groups-root"></div>
            <div id="sidebar-friends-root"></div>
        </div>
        <div class="zalo-chat-main">
            <div id="active-chat-title" style="padding:20px; border-bottom:1px solid #eee; font-weight:bold;">Chọn hội thoại</div>
            <div id="msg-panel" style="flex:1; padding:20px; overflow-y:auto;"></div>
            <div style="padding:15px; background:white; display:flex;">
                <input type="text" id="type-box" style="flex:1; border:none; outline:none;" placeholder="Soạn tin nhắn...">
                <button onclick="emitMessage()">GỬI</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        // Login Logic
        document.getElementById('btn-login').addEventListener('click', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        });

        // System Notification Toast
        socket.on('system_msg', (data) => {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = 'toast-item';
            div.innerText = "Hệ thống: " + data.text;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        });

        // Chat Logic
        function emitMessage() {
            const input = document.getElementById('type-box');
            if(input.value) {
                socket.emit('msg_send', { text: input.value, sender: 'Tôi' });
                input.value = '';
            }
        }

        socket.on('msg_receive', (data) => {
            const panel = document.getElementById('msg-panel');
            panel.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${data.sender}:</b> ${data.text}</div>`;
        });
    </script>
</body>
</html>
